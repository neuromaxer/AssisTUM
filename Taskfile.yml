version: "3"

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - npm install

  dev:
    desc: Start OpenCode + backend + frontend dev servers
    cmds:
      - npx concurrently -n oc,be,fe -c blue,green,yellow "opencode serve --port 4096" "npm run dev -w backend" "npm run dev -w frontend"

  dev:backend:
    desc: Start backend dev server only
    cmds:
      - npm run dev -w backend

  dev:frontend:
    desc: Start frontend dev server only
    cmds:
      - npm run dev -w frontend

  build:
    desc: Build frontend + backend for production
    cmds:
      - npm run build -w frontend
      - npm run build -w backend

  start:
    desc: Start production backend server
    cmds:
      - npm run start -w backend

  typecheck:
    desc: Run TypeScript type checking for both workspaces
    cmds:
      - npx tsc --noEmit --project backend/tsconfig.json
      - npx tsc --noEmit --project frontend/tsconfig.json

  clean:
    desc: Remove build artifacts and database
    cmds:
      - rm -rf backend/dist frontend/dist
      - rm -f backend/assistum.db

  seed:
    desc: Pre-populate settings for demo (edit values in this task)
    cmds:
      - |
        echo "Seeding demo settings..."
        curl -s -X PUT http://localhost:3001/api/settings/tum_ical_url -H 'Content-Type: application/json' -d '{"value":"PASTE_ICAL_URL_HERE"}'
        curl -s -X POST http://localhost:3001/api/clubs -H 'Content-Type: application/json' -d '{"name":"TUM.ai","url":"https://www.tum-ai.com/events"}'
        echo "\nDone. Edit Taskfile.yml to set real credential values."
